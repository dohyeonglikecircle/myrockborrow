<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모여락 공용악기대여</title>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; text-align: center; }
        
        /* 🖤 상단 헤더 (이미지 디자인 복원) */
        header { 
            background-color: #111; 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #222;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo { height: 40px; } /* 로고 이미지가 있다면 여기에 */
        .site-title { color: #f39c12; font-size: 1.5em; font-weight: 800; margin: 0; }
        
        .header-right { display: flex; gap: 10px; }
        .nav-btn { 
            background: #222; border: 1px solid #444; color: #fff; 
            padding: 8px 15px; border-radius: 6px; text-decoration: none; font-size: 0.9em; 
        }
        .nav-btn:hover { background: #333; }

        /* 중앙 메인 섹션 */
        .main-container { padding: 80px 20px; }
        .sub-text { color: #888; margin-bottom: 40px; font-size: 0.9em; }
        
        /* 세션 버튼 목록 */
        .btn-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 50px; }
        .session-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px 30px; 
            border-radius: 12px; cursor: pointer; text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .session-btn:hover { background: #252525; transform: translateY(-3px); border-color: #f39c12; }
        
        /* 관리자 버튼 */
        .admin-btn { background: #e74c3c; border: none; }
        .admin-btn:hover { background: #c0392b; }

        /* 하단 링크 */
        .divider { border-top: 1px dashed #222; margin: 40px auto; width: 60%; }
        .quick-links { display: flex; justify-content: center; gap: 15px; }
        .link-btn { 
            background: transparent; border: 1.5px solid #1e3799; color: #fff; 
            padding: 12px 25px; border-radius: 30px; text-decoration: none; font-size: 0.9em;
        }

        /* 🔐 관리자 전용 팝업창 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { 
            background: #1a1a1a; margin: 10% auto; padding: 35px; border-radius: 20px; 
            width: 400px; border: 1px solid #333; text-align: left;
        }
        .modal-input { 
            width: 100%; padding: 14px; margin: 10px 0; background: #000; color: #fff; 
            border: 1px solid #333; border-radius: 10px; box-sizing: border-box;
        }
        .modal-submit { 
            width: 100%; padding: 15px; background: #e74c3c; border: none; color: #fff; 
            font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="/static/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'"> 
            <h1 class="site-title">모여락 공용악기대여</h1>
        </div>
        <div class="header-right">
            {% if user %}
                <span style="color:#888; font-size:0.9em; margin-right:10px;">{{ user }}님 환영합니다</span>
                <a href="/logout" class="nav-btn">로그아웃</a>
            {% else %}
                <a href="/login" class="nav-btn">로그인</a>
                <a href="/signup" class="nav-btn">회원가입</a>
            {% endif %}
        </div>
    </header>

    <div class="main-container">
        <p class="sub-text">원하는 세션의 악기를 확인하고 대여하세요!</p>

        <div class="btn-container">
            <a href="/session/Vocal" class="session-btn">🎤 보컬</a>
            <a href="/session/Guitar" class="session-btn">🎸 기타</a>
            <a href="/session/Base" class="session-btn">🎸 베이스</a>
            <a href="/session/Drum" class="session-btn">🥁 드럼</a>
            <a href="/session/Keyboard" class="session-btn">🎹 키보드</a>
            
            <button onclick="openAdminModal()" class="session-btn admin-btn">⚙️ 관리자 악기 등록</button>
        </div>

        <div class="divider"></div>

        <p style="color:#888; font-size: 0.9em;">🔗 빠른 바로가기</p>
        <div class="quick-links">
            <a href="#" class="link-btn">📌 공연 선곡 및 일정</a>
            <a href="#" class="link-btn">📌 화요뜨락 홈페이지</a>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:#e74c3c;">⚙️ 파트 정보 수정</h2>
            <form action="/admin/setup" method="POST">
                <label style="font-size:0.8em; color:#666;">수정할 세션 선택</label>
                <select name="target_session" class="modal-input">
                    <option value="Vocal">Vocal</option>
                    <option value="Guitar">Guitar</option>
                    <option value="Base">Base</option>
                    <option value="Drum">Drum</option>
                    <option value="Keyboard">Keyboard</option>
                </select>
                
                <input type="text" name="leader_name" class="modal-input" placeholder="파트장 이름 입력" required>
                <input type="text" name="instagram" class="modal-input" placeholder="인스타 계정 (@ 없이)" required>
                
                <button type="submit" class="modal-submit">설정 저장하기</button>
                <button type="button" onclick="closeAdminModal()" style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">닫기</button>
            </form>
        </div>
    </div>

    <script>
        function openAdminModal() { document.getElementById('adminModal').style.display = 'block'; }
        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target == document.getElementById('adminModal')) closeAdminModal(); }
    </script>

</body>
</html>
