<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모여락 공용악기대여</title>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #111; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .site-title { color: #f39c12; font-size: 1.4em; font-weight: bold; margin: 0; }
        .nav-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-size: 0.9em; margin-left: 5px; }
        .main-content { padding: 60px 20px; }
        .btn-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 40px 0; }
        .session-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .session-btn:hover { border-color: #f39c12; background: #222; }
        .admin-btn { background: #e74c3c; border: none; cursor: pointer; color: white; font-weight: bold; border-radius: 12px; padding: 18px 30px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 10% auto; padding: 30px; border-radius: 20px; width: 380px; border: 1px solid #333; text-align: left; }
        .modal-input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <h1 class="site-title">🐉 모여락 공용악기대여</h1>
        <div>
            {% if user %}<a href="/logout" class="nav-btn">로그아웃</a>
            {% else %}<a href="/login" class="nav-btn">로그인</a> <a href="/signup" class="nav-btn">회원가입</a>{% endif %}
        </div>
    </header>
    <div class="main-content">
        <p style="color:#888;">원하는 세션의 악기를 확인하고 대여하세요!</p>
        <div class="btn-container">
            <a href="/session/Vocal" class="session-btn">🎤 보컬</a>
            <a href="/session/Guitar" class="session-btn">🎸 기타</a>
            <a href="/session/Base" class="session-btn">🎸 베이스</a>
            <a href="/session/Drum" class="session-btn">🥁 드럼</a>
            <a href="/session/Keyboard" class="session-btn">🎹 키보드</a>
            <button onclick="openAdmin()" class="admin-btn">⚙️ 관리자 악기 등록</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#e74c3c; margin-top:0;">🎹 악기 정보 등록</h2>
            <form action="/admin/add_instrument" method="POST">
                <select name="session_name" class="modal-input">
                    <option value="Guitar">Guitar (기타)</option>
                    <option value="Base">Base (베이스)</option>
                </select>
                <input type="text" name="instrument_model" class="modal-input" placeholder="악기 모델명" required>
                <input type="text" name="instrument_img" class="modal-input" placeholder="악기 사진 URL">
                <button type="submit" style="width:100%; padding:15px; background:#e74c3c; border:none; color:#fff; font-weight:bold; border-radius:10px;">등록하기</button>
                <button type="button" onclick="closeAdmin()" style="width:100%; background:none; border:none; color:#555; margin-top:10px;">닫기</button>
            </form>
        </div>
    </div>
    <script>
        function openAdmin() { document.getElementById('adminModal').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
    </script>
</body>
</html>
