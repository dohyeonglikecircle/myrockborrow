<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 모여락</title>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-box { background: #1a1a1a; padding: 40px; border-radius: 20px; width: 350px; border: 1px solid #333; }
        h2 { color: #f39c12; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus, select:focus { border-color: #f39c12; }
        .submit-btn { width: 100%; padding: 15px; background: #f39c12; border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="signup-box">
        <h2>MOYORAK SIGNUP</h2>
        <form action="/signup" method="POST">
            <div class="input-group">
                <label>아이디</label>
                <input type="text" name="username" required>
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" name="password" required>
            </div>
            <div class="input-group">
                <label>이름</label>
                <input type="text" name="name" required>
            </div>
            <div class="input-group">
                <label>기수</label>
                <select name="generation">
                    {% for gen in generations %}
                    <option value="{{ gen }}">{{ gen }}기</option>
                    {% endfor %}
                </select>
            </div>
            <div class="input-group">
                <label>세션</label>
                <select name="session">
                    <option value="Vocal">보컬</option>
                    <option value="Guitar">기타</option>
                    <option value="Base">베이스</option>
                    <option value="Drum">드럼</option>
                    <option value="Keyboard">키보드</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">가입하기</button>
            <center><br><a href="/" style="color:#555; text-decoration:none; font-size:0.8em;">취소하고 돌아가기</a></center>
        </form>
    </div>
</body>
</html>
