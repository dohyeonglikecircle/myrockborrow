<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모여락 로그인</title>
    <link rel="icon" href="/static/images/moyorak_logo.ico">
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #1f1f1f; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        .login-box img { height: 50px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background-color: #333; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #f39c12; color: #121212; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #e67e22; }
    </style>
</head>
<body>
    <div class="login-box">
        <a href="/"><img src="/static/images/moyorak_logo.png" alt="모여락 로고"></a>
        <h2>로그인</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">접속하기</button>
        </form>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <script>
            alert("{{ messages[0] }}");
        </script>
        {% endif %}
    {% endwith %}
</body>
</html>
